<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUB View</title>
  <style>
    :root {
      --safe: #1d8b57;
      --ink: #151311;
      --muted: #72685f;
      --cream: #f4eadc;
      --shadow: 0 28px 70px rgba(158, 132, 98, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(214, 196, 171, 0.22), transparent 18%),
        radial-gradient(circle at 85% 12%, rgba(255, 255, 255, 0.58), transparent 20%),
        linear-gradient(180deg, #faf5ec 0%, #ece1d2 100%);
    }

    .shell {
      width: min(1020px, calc(100vw - 32px));
      margin: 24px auto;
      padding: 28px;
      border-radius: 36px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.72), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(245, 236, 223, 0.94));
      border: 1px solid rgba(140, 118, 92, 0.16);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 22px;
      align-items: center;
      margin-bottom: 28px;
    }

    .hero img {
      width: 112px;
      height: 112px;
      object-fit: contain;
      border-radius: 28px;
      background: #000;
      padding: 14px;
      border: 2px solid rgba(255, 255, 255, 0.9);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .subtitle,
    .nav a { color: rgba(56, 46, 38, 0.72); }

    .nav a {
      text-decoration: none;
      font-size: 14px;
    }

    .panel {
      display: grid;
      gap: 18px;
      padding: 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      border: 1px solid rgba(140, 118, 92, 0.18);
      box-shadow: 0 18px 40px rgba(168, 141, 110, 0.18);
    }

    .chip {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .status-flag {
      display: inline-flex;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(140, 118, 92, 0.16);
      background: rgba(255, 255, 255, 0.55);
    }

    .status-flag.unlocked {
      color: var(--safe);
      background: rgba(29, 139, 87, 0.12);
      border-color: rgba(29, 139, 87, 0.22);
    }

    .ring-card,
    .bt-box,
    .bt-device {
      border: 1px solid rgba(140, 118, 92, 0.16);
      border-radius: 24px;
      background: linear-gradient(180deg, #fffdfa, #f4eadc);
    }

    .ring-card,
    .bt-box {
      display: grid;
      gap: 14px;
      padding: 18px 14px 14px;
    }

    .ring-cluster {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .ring-unit {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .ring-wrap {
      position: relative;
      width: 104px;
      height: 104px;
    }

    .ring-svg {
      width: 104px;
      height: 104px;
      transform: rotate(-90deg);
    }

    .ring-track,
    .ring-progress {
      fill: none;
      stroke-width: 8;
    }

    .ring-track { stroke: rgba(21, 19, 17, 0.12); }

    .ring-progress {
      stroke: #111;
      stroke-linecap: round;
      transition: stroke-dashoffset 900ms linear;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
    }

    .ring-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .ring-unit-label,
    .ring-note {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .ring-unit-label {
      font-size: 11px;
      text-align: center;
    }

    .notice {
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid rgba(140, 118, 92, 0.22);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--cream);
      color: var(--ink);
    }

    .primary {
      background: #111;
      color: #fffaf5;
    }

    .bt-device {
      padding: 12px 14px;
      line-height: 1.5;
      font-size: 14px;
      background: rgba(245, 236, 223, 0.82);
      color: var(--ink);
    }

    @media (max-width: 860px) {
      .hero,
      .ring-cluster {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <img src="./sub.png" alt="SUB Logo">
      <div>
        <div class="chip">Puppy Watch</div>
        <h1>SUB 查看页</h1>
        <p class="subtitle">SUB 页面只保留状态查看和蓝牙连接的核心操作。</p>
      </div>
      <div class="nav"><a href="./index.html">返回入口</a> / <a href="./dom.html">打开 DOM 页面</a></div>
    </section>

    <section class="panel">
      <div id="statusFlag" class="status-flag">当前已上锁</div>

      <div class="ring-card">
        <div class="ring-cluster">
          <div class="ring-unit">
            <div class="ring-wrap">
              <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                <circle class="ring-progress" id="ringHoursProgress" cx="52" cy="52" r="40"></circle>
              </svg>
              <div class="ring-center"><div id="ringHoursValue" class="ring-value">--</div></div>
            </div>
            <div class="ring-unit-label">Hours</div>
          </div>

          <div class="ring-unit">
            <div class="ring-wrap">
              <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                <circle class="ring-progress" id="ringMinutesProgress" cx="52" cy="52" r="40"></circle>
              </svg>
              <div class="ring-center"><div id="ringMinutesValue" class="ring-value">--</div></div>
            </div>
            <div class="ring-unit-label">Minutes</div>
          </div>

          <div class="ring-unit">
            <div class="ring-wrap">
              <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                <circle class="ring-progress" id="ringSecondsProgress" cx="52" cy="52" r="40"></circle>
              </svg>
              <div class="ring-center"><div id="ringSecondsValue" class="ring-value">--</div></div>
            </div>
            <div class="ring-unit-label">Seconds</div>
          </div>
        </div>

        <div id="ringNote" class="ring-note">等待 DOM 设置时间。</div>
      </div>

      <div class="notice">SUB 页面同样走已登录账户的会话，不再读取全局共享状态。</div>

      <div class="bt-box">
        <div>
          <div class="chip" style="margin-bottom:8px;">Keybox Link</div>
        </div>

        <div class="actions">
          <button id="scanBtBtn" type="button">搜索蓝牙</button>
          <button class="primary" id="connectBtBtn" type="button">连接蓝牙</button>
        </div>

        <div id="btDeviceInfo" class="bt-device">尚未选择蓝牙设备。</div>
      </div>
    </section>
  </main>

  <script>
    const SESSION_KEY = "cb-lock-session";
    const API_URL = "/api/state?mode=sub_view";
    const ringCircumference = 2 * Math.PI * 40;
    const statusFlag = document.getElementById("statusFlag");
    const ringHoursProgress = document.getElementById("ringHoursProgress");
    const ringMinutesProgress = document.getElementById("ringMinutesProgress");
    const ringSecondsProgress = document.getElementById("ringSecondsProgress");
    const ringHoursValue = document.getElementById("ringHoursValue");
    const ringMinutesValue = document.getElementById("ringMinutesValue");
    const ringSecondsValue = document.getElementById("ringSecondsValue");
    const ringNote = document.getElementById("ringNote");
    const scanBtBtn = document.getElementById("scanBtBtn");
    const connectBtBtn = document.getElementById("connectBtBtn");
    const btDeviceInfo = document.getElementById("btDeviceInfo");

    let currentState = null;
    let btDevice = null;
    let btCharacteristic = null;
    let autoSendTimer = null;

    const serviceUuid = "000000ff-0000-1000-8000-00805f9b34fb";
    const characteristicUuid = "0000ff01-0000-1000-8000-00805f9b34fb";

    function getSession() {
      return sessionStorage.getItem(SESSION_KEY);
    }

    function clearSession() {
      sessionStorage.removeItem(SESSION_KEY);
    }

    function redirectToPortal(message) {
      clearSession();
      window.location.href = `./index.html${message ? `#${encodeURIComponent(message)}` : ""}`;
    }

    async function request(path, options = {}) {
      const token = getSession();
      if (!token) {
        redirectToPortal("请先登录");
        throw new Error("未登录");
      }

      const headers = new Headers(options.headers || {});
      headers.set("Accept", "application/json");
      headers.set("Authorization", `Bearer ${token}`);

      const response = await fetch(path, { ...options, headers });
      const payload = await response.json().catch(() => ({}));

      if (!response.ok) {
        if (response.status === 401) {
          redirectToPortal(payload.error || "登录已失效");
        }
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }

      return payload;
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function setBtDeviceInfo(message) {
      btDeviceInfo.textContent = message;
    }

    function getPayloadFromState(state) {
      return {
        account: state.user.account,
        dom: state.user.dom,
        sub: state.user.sub,
        locked: !!state.locked,
        unlockTime: state.unlockTime || null,
        remainingTime: state.remainingTime || "--:--:--",
        source: "sub",
        sentAt: new Date().toISOString()
      };
    }

    async function scanBluetoothDevice() {
      if (!navigator.bluetooth) {
        throw new Error("当前浏览器不支持 Web Bluetooth，请使用最新版 Chrome 或 Edge。");
      }

      btDevice = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [serviceUuid]
      });

      setBtDeviceInfo(`已选择设备: ${btDevice.name || "Unknown Device"}`);

      btDevice.addEventListener("gattserverdisconnected", () => {
        btCharacteristic = null;
        if (autoSendTimer) {
          clearInterval(autoSendTimer);
          autoSendTimer = null;
        }
        setBtDeviceInfo(`设备已断开: ${btDevice ? btDevice.name || "Unknown Device" : "Unknown Device"}`);
      });
    }

    async function connectBluetooth() {
      if (!navigator.bluetooth) {
        throw new Error("当前浏览器不支持 Web Bluetooth，请使用最新版 Chrome 或 Edge。");
      }
      if (!btDevice) {
        throw new Error("请先搜索并选择蓝牙设备。");
      }

      const server = await btDevice.gatt.connect();
      const service = await server.getPrimaryService(serviceUuid);
      btCharacteristic = await service.getCharacteristic(characteristicUuid);
      setBtDeviceInfo(`已连接设备: ${btDevice.name || "Unknown Device"}`);

      if (autoSendTimer) {
        clearInterval(autoSendTimer);
      }

      autoSendTimer = setInterval(() => {
        void safeBluetoothSend();
      }, 1000);

      await safeBluetoothSend();
    }

    async function sendBluetoothState() {
      if (!btCharacteristic || !currentState) {
        return;
      }

      const payload = getPayloadFromState(currentState);
      const encoded = new TextEncoder().encode(JSON.stringify(payload));

      if (typeof btCharacteristic.writeValueWithoutResponse === "function") {
        await btCharacteristic.writeValueWithoutResponse(encoded);
      } else {
        await btCharacteristic.writeValue(encoded);
      }
    }

    async function safeBluetoothSend() {
      try {
        await sendBluetoothState();
      } catch (error) {
        setBtDeviceInfo(`发送失败: ${error.message}`);
      }
    }

    function setRingProgress(element, progress) {
      element.style.strokeDasharray = `${ringCircumference}`;
      element.style.strokeDashoffset = `${ringCircumference * (1 - progress)}`;
    }

    function syncRing(remainingMs, totalMs, remainingLabel) {
      if (!remainingMs || !totalMs || remainingMs <= 0 || totalMs <= 0) {
        setRingProgress(ringHoursProgress, 0);
        setRingProgress(ringMinutesProgress, 0);
        setRingProgress(ringSecondsProgress, 0);
        ringHoursValue.textContent = remainingMs === 0 && totalMs ? "00" : "--";
        ringMinutesValue.textContent = remainingMs === 0 && totalMs ? "00" : "--";
        ringSecondsValue.textContent = remainingMs === 0 && totalMs ? "00" : "--";
        ringNote.textContent = totalMs ? "开锁时间已到，圆环计时完成。" : "等待 DOM 设置时间。";
        return;
      }

      const totalSeconds = Math.ceil(remainingMs / 1000);
      const totalHours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const hoursProgressBase = Math.max(1, Math.ceil(totalMs / 3600000));

      setRingProgress(ringHoursProgress, Math.max(0, Math.min(1, totalHours / hoursProgressBase)));
      setRingProgress(ringMinutesProgress, Math.max(0, Math.min(1, minutes / 59)));
      setRingProgress(ringSecondsProgress, Math.max(0, Math.min(1, seconds / 59)));

      ringHoursValue.textContent = pad(Math.min(totalHours, 99));
      ringMinutesValue.textContent = pad(minutes);
      ringSecondsValue.textContent = pad(seconds);
      ringNote.textContent = `距离自动开锁还有 ${remainingLabel}。`;
    }

    function renderState(state) {
      currentState = state;

      if (!state.actor?.dom) {
        redirectToPortal("当前账户不能打开 SUB 查看页");
        return;
      }

      statusFlag.textContent = state.locked ? "当前已上锁" : "当前已开锁";
      statusFlag.classList.toggle("unlocked", !state.locked);

      if (!state.unlockTime) {
        syncRing(null, null, "--:--:--");
        return;
      }

      const autoUnlockAt = new Date(state.unlockTime);
      const scheduledAt = state.scheduledAt ? new Date(state.scheduledAt) : null;
      const remainingMs = autoUnlockAt.getTime() - Date.now();
      const remainingLabel = state.remainingTime || "--:--:--";
      const totalMs = scheduledAt && !Number.isNaN(scheduledAt.getTime())
        ? Math.max(autoUnlockAt.getTime() - scheduledAt.getTime(), 0)
        : Math.max(remainingMs, 0);

      syncRing(Math.max(remainingMs, 0), totalMs, remainingLabel);
    }

    async function refreshState() {
      try {
        const state = await request(API_URL);
        renderState(state);
      } catch (error) {
        ringNote.textContent = `同步失败: ${error.message}`;
      }
    }

    scanBtBtn.addEventListener("click", async () => {
      try {
        await scanBluetoothDevice();
      } catch (error) {
        setBtDeviceInfo(`搜索失败: ${error.message}`);
      }
    });

    connectBtBtn.addEventListener("click", async () => {
      try {
        await connectBluetooth();
      } catch (error) {
        setBtDeviceInfo(`连接失败: ${error.message}`);
      }
    });

    refreshState();
    setInterval(refreshState, 1000);
  </script>
</body>
</html>
