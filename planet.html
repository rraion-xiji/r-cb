<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小狗星球</title>
  <style>
    :root {
      --bg: #090909;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      --dom: #d9a84d;
      --sub: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 80% 10%, rgba(217, 168, 77, 0.12), transparent 24%),
        linear-gradient(180deg, #090909 0%, #111111 100%);
      padding: 24px;
    }

    .shell {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 24px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(24, 24, 24, 0.97), rgba(14, 14, 14, 0.99));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 50px);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 0;
      color: rgba(255, 248, 240, 0.74);
      line-height: 1.7;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: rgba(255, 248, 240, 0.72);
      font-size: 14px;
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: middle;
    }

    .legend .dom::before {
      background: var(--dom);
    }

    .legend .sub::before {
      background: var(--sub);
    }

    .planet {
      position: relative;
      height: min(78vh, 900px);
      border-radius: 26px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .status {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 248, 240, 0.74);
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>小狗星球</h1>
        <p class="subtitle">Three.js 版本的小狗星球。左键拖动画布，滚轮缩放，直接拖动星球节点可重新排布关系。</p>
      </div>
      <div class="nav">
        <a href="./index.html">返回首页</a>
        <a href="./dom.html">DOM 控制页</a>
        <a href="./sub.html">SUB 查看页</a>
      </div>
    </section>

    <div class="legend">
      <span class="dom">DOM 单向箭头</span>
      <span class="sub">SUB 单向箭头</span>
    </div>

    <section id="planet" class="planet"></section>
    <div id="status" class="status">正在加载 Three.js 星球...</div>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { MapControls } from "three/addons/controls/MapControls.js";
    import { DragControls } from "three/addons/controls/DragControls.js";

    const SESSION_KEY = "cb-lock-session";
    const container = document.getElementById("planet");
    const status = document.getElementById("status");

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.fog = new THREE.Fog(0x111111, 550, 1200);

    const camera = new THREE.OrthographicCamera();
    const controls = new MapControls(camera, renderer.domElement);
    controls.enableRotate = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.zoomSpeed = 1.1;
    controls.screenSpacePanning = true;

    const ambient = new THREE.AmbientLight(0xffffff, 1.35);
    scene.add(ambient);

    const rim = new THREE.DirectionalLight(0xf5e8d1, 1.1);
    rim.position.set(120, 200, 180);
    scene.add(rim);

    const floor = new THREE.GridHelper(1800, 32, 0x3f3a33, 0x262626);
    floor.material.opacity = 0.24;
    floor.material.transparent = true;
    floor.rotation.x = Math.PI / 2;
    scene.add(floor);

    const graphState = {
      nodes: [],
      links: [],
      nodeObjects: [],
      arrowObjects: []
    };

    function getSession() {
      return localStorage.getItem(SESSION_KEY);
    }

    function redirectToPortal(message) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = `./index.html#${encodeURIComponent(message || "请先登录")}`;
    }

    async function request(path) {
      const token = getSession();
      if (!token) {
        redirectToPortal("请先登录");
        throw new Error("未登录");
      }

      const response = await fetch(path, {
        headers: {
          Accept: "application/json",
          Authorization: `Bearer ${token}`
        }
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 401) {
          redirectToPortal(payload.error || "登录已失效");
        }
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

    function resizeCamera() {
      const width = container.clientWidth;
      const height = container.clientHeight;
      const aspect = width / Math.max(height, 1);
      const frustum = 380;
      camera.left = -frustum * aspect;
      camera.right = frustum * aspect;
      camera.top = frustum;
      camera.bottom = -frustum;
      camera.near = -2000;
      camera.far = 2000;
      camera.position.set(0, 0, 100);
      camera.zoom = 1;
      camera.updateProjectionMatrix();
      controls.target.set(0, 0, 0);
      controls.update();
      renderer.setSize(width, height);
    }

    function createLabelTexture(lines, accent) {
      const canvas = document.createElement("canvas");
      canvas.width = 420;
      canvas.height = 220;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(255, 253, 249, 0.98)";
      ctx.strokeStyle = accent;
      ctx.lineWidth = 8;
      const radius = 28;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(canvas.width - radius, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, radius);
      ctx.lineTo(canvas.width, canvas.height - radius);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);
      ctx.lineTo(radius, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#141414";
      ctx.font = "bold 34px Trebuchet MS, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif";
      ctx.fillText(lines[0], 28, 56);

      ctx.fillStyle = "#6d655d";
      ctx.font = "24px Trebuchet MS, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif";
      ctx.fillText(lines[1], 28, 110);
      ctx.fillText(lines[2], 28, 150);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function createNodeObject(node, position) {
      const group = new THREE.Group();
      group.position.copy(position);
      group.userData.nodeId = node.id;

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(24, 32, 32),
        new THREE.MeshStandardMaterial({
          color: 0xf2e5d3,
          emissive: new THREE.Color(node.dom || node.sub ? 0x2a2114 : 0x171717),
          emissiveIntensity: 0.5,
          roughness: 0.38,
          metalness: 0.08
        })
      );
      group.add(sphere);

      const halo = new THREE.Mesh(
        new THREE.RingGeometry(30, 35, 48),
        new THREE.MeshBasicMaterial({
          color: node.dom ? 0xd9a84d : 0xffffff,
          transparent: true,
          opacity: 0.8,
          side: THREE.DoubleSide
        })
      );
      halo.rotation.x = Math.PI / 2;
      group.add(halo);

      const labelTexture = createLabelTexture(
        [
          node.label,
          `DOM: ${node.dom || "未设置"}`,
          `SUB: ${node.sub || "未设置"}`
        ],
        node.dom ? "#d9a84d" : "#111111"
      );
      const label = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: labelTexture,
          transparent: true
        })
      );
      label.position.set(0, 78, 0);
      label.scale.set(180, 94, 1);
      group.add(label);

      return group;
    }

    function clearGraph() {
      for (const object of graphState.nodeObjects) {
        scene.remove(object);
      }
      for (const object of graphState.arrowObjects) {
        scene.remove(object);
      }
      graphState.nodeObjects = [];
      graphState.arrowObjects = [];
    }

    function buildArrows() {
      for (const link of graphState.links) {
        const source = graphState.nodeObjects.find((item) => item.userData.nodeId === link.source);
        const target = graphState.nodeObjects.find((item) => item.userData.nodeId === link.target);
        if (!source || !target) {
          continue;
        }

        const direction = new THREE.Vector3().subVectors(target.position, source.position);
        const length = Math.max(direction.length() - 36, 8);
        const normalized = direction.clone().normalize();
        const color = link.type === "dom" ? 0xd9a84d : 0xffffff;
        const arrow = new THREE.ArrowHelper(
          normalized,
          source.position.clone(),
          length,
          color,
          18,
          10
        );
        arrow.line.material.transparent = true;
        arrow.line.material.opacity = 0.88;
        arrow.cone.material.transparent = true;
        arrow.cone.material.opacity = 0.94;
        graphState.arrowObjects.push(arrow);
        scene.add(arrow);
      }
    }

    function layoutNodes(nodes) {
      const radius = Math.max(160, 58 * nodes.length);
      return nodes.map((node, index) => {
        const angle = (Math.PI * 2 * index) / Math.max(nodes.length, 1);
        return {
          node,
          position: new THREE.Vector3(
            Math.cos(angle) * radius,
            Math.sin(angle) * radius,
            (index % 2) * 8
          )
        };
      });
    }

    function rebuildGraph() {
      clearGraph();
      const positionedNodes = layoutNodes(graphState.nodes);
      graphState.nodeObjects = positionedNodes.map(({ node, position }) => createNodeObject(node, position));
      for (const object of graphState.nodeObjects) {
        scene.add(object);
      }
      buildArrows();
      setupDragControls();
    }

    let dragControls = null;

    function refreshArrows() {
      for (const arrow of graphState.arrowObjects) {
        scene.remove(arrow);
      }
      graphState.arrowObjects = [];
      buildArrows();
    }

    function setupDragControls() {
      if (dragControls) {
        dragControls.dispose();
      }
      dragControls = new DragControls(graphState.nodeObjects, camera, renderer.domElement);
      dragControls.recursive = false;
      dragControls.transformGroup = false;

      dragControls.addEventListener("hoveron", (event) => {
        document.body.style.cursor = "grab";
        const sphere = event.object.children[0];
        if (sphere?.material?.emissiveIntensity !== undefined) {
          sphere.material.emissiveIntensity = 0.9;
        }
      });

      dragControls.addEventListener("hoveroff", (event) => {
        document.body.style.cursor = "";
        const sphere = event.object.children[0];
        if (sphere?.material?.emissiveIntensity !== undefined) {
          sphere.material.emissiveIntensity = 0.5;
        }
      });

      dragControls.addEventListener("dragstart", () => {
        controls.enabled = false;
        document.body.style.cursor = "grabbing";
      });

      dragControls.addEventListener("drag", (event) => {
        event.object.position.z = 0;
        refreshArrows();
      });

      dragControls.addEventListener("dragend", () => {
        controls.enabled = true;
        document.body.style.cursor = "";
      });
    }

    async function init() {
      resizeCamera();
      try {
        const graph = await request("/api/planet");
        graphState.nodes = graph.nodes || [];
        graphState.links = graph.links || [];

        if (!graphState.nodes.length) {
          status.textContent = "当前没有用户，无法生成星球关系图。";
          return;
        }

        rebuildGraph();
        status.textContent = `已加载 ${graphState.nodes.length} 个用户节点，${graphState.links.length} 条单向关系。`;
      } catch (error) {
        status.textContent = `加载失败: ${error.message}`;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      resizeCamera();
      refreshArrows();
    });

    init();
    animate();
  </script>
</body>
</html>
