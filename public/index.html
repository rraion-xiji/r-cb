<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB Lock Portal</title>
  <style>
    :root {
      --bg: #080808;
      --shell: #121212;
      --panel: #f3efe7;
      --panel-edge: rgba(91, 73, 49, 0.14);
      --ink: #14110f;
      --muted: #76695a;
      --line: rgba(91, 73, 49, 0.16);
      --dark-button: #4a3418;
      --dark-button-hover: #5c4120;
      --safe: #1d8b57;
      --safe-bg: rgba(29, 139, 87, 0.14);
      --safe-line: rgba(29, 139, 87, 0.3);
      --danger-bg: #fdeced;
      --danger-ink: #a12639;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 255, 255, 0.06), transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(120, 95, 58, 0.14), transparent 24%),
        linear-gradient(180deg, #060606 0%, #0e0e0e 100%);
      padding: 18px;
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
      border-radius: 30px;
      background: linear-gradient(180deg, #151515, #101010);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .hero-logo {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      object-fit: contain;
      background: #000;
      padding: 10px;
      border: 2px solid rgba(255, 255, 255, 0.14);
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .hero-tools {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .auth-shell[hidden],
    .dashboard[hidden],
    .editor[hidden],
    .work-card[hidden] {
      display: none;
    }

    .auth-shell {
      display: grid;
      place-items: center;
      margin-top: 10px;
    }

    .auth-card {
      width: min(620px, 100%);
      border-radius: 30px;
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--panel-edge);
      padding: 28px;
    }

    .auth-head h2 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: -0.04em;
    }

    .auth-head p,
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 6px;
      border-radius: 18px;
      background: rgba(91, 73, 49, 0.08);
      margin: 22px 0;
    }

    .tab {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab.active {
      background: #111;
      color: #fff;
    }

    .form-panel[hidden] {
      display: none;
    }

    .fields {
      display: grid;
      gap: 14px;
    }

    .fields.two {
      grid-template-columns: 1fr 1fr;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
    }

    input,
    .work-input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid rgba(91, 73, 49, 0.24);
      background: #fffdfa;
      color: var(--ink);
      font-size: 15px;
      outline: none;
    }

    input:focus,
    .work-input:focus {
      border-color: rgba(20, 17, 15, 0.6);
      box-shadow: 0 0 0 3px rgba(20, 17, 15, 0.08);
    }

    .submit,
    .small-button,
    .nav-button,
    .planet-link {
      border-radius: 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .submit,
    .nav-button.dark,
    .planet-link {
      border: 0;
      background: linear-gradient(135deg, #111 0%, var(--dark-button) 100%);
      color: #fff;
    }

    .submit {
      width: 100%;
      margin-top: 18px;
      padding: 15px 18px;
    }

    .small-button,
    .nav-button.light {
      border: 1px solid rgba(91, 73, 49, 0.24);
      background: #f7eddc;
      color: var(--ink);
      padding: 13px 18px;
    }

    .small-button:hover,
    .nav-button.light:hover {
      background: #f1e3cc;
    }

    .nav-button.dark:hover,
    .planet-link:hover,
    .submit:hover {
      background: linear-gradient(135deg, #1a1a1a 0%, var(--dark-button-hover) 100%);
    }

    .danger {
      background: var(--danger-bg);
      color: var(--danger-ink);
      border-color: rgba(161, 38, 57, 0.18);
    }

    .status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 252, 246, 0.9);
      color: var(--muted);
      line-height: 1.6;
      border: 1px solid rgba(91, 73, 49, 0.12);
    }

    .dashboard {
      margin-top: 18px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border-radius: 30px;
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--panel-edge);
      padding: 18px;
    }

    .profile-hero {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 251, 245, 0.72);
      border: 1px solid rgba(91, 73, 49, 0.12);
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      object-fit: cover;
      background: #000;
      border: 1px solid rgba(91, 73, 49, 0.16);
      image-rendering: pixelated;
    }

    .profile-name {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0 0 8px;
    }

    .profile-subtitle {
      color: var(--muted);
      line-height: 1.6;
      margin: 0;
    }

    .editor,
    .work-card,
    .stage-card,
    .device-box {
      padding: 16px;
      border-radius: 24px;
      background: rgba(255, 251, 245, 0.72);
      border: 1px solid rgba(91, 73, 49, 0.12);
      line-height: 1.65;
    }

    .editor h3,
    .work-card h3 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .editor-actions,
    .work-actions,
    .hero-actions,
    .stage-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .editor-actions,
    .work-actions {
      margin-top: 14px;
    }

    .editor {
      margin-top: 6px;
    }

    .workbench {
      display: grid;
      gap: 14px;
    }

    .stage-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    .stage-title {
      margin: 0;
      font-size: clamp(32px, 4vw, 48px);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .stage-subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 560px;
    }

    .status-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid rgba(91, 73, 49, 0.18);
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
    }

    .pill.online,
    .pill.unlocked {
      color: var(--safe);
      background: var(--safe-bg);
      border-color: var(--safe-line);
    }

    .control-card {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .work-field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 320px);
      gap: 14px;
      align-items: end;
    }

    .ring-card {
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(91, 73, 49, 0.12);
      background: rgba(255, 255, 255, 0.32);
    }

    .ring-cluster {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
    }

    .ring-unit {
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .ring-wrap {
      position: relative;
      width: 118px;
      height: 118px;
    }

    .ring-svg {
      width: 118px;
      height: 118px;
      transform: rotate(-90deg);
    }

    .ring-track,
    .ring-progress {
      fill: none;
      stroke-width: 8;
    }

    .ring-track {
      stroke: rgba(20, 20, 20, 0.12);
    }

    .ring-progress {
      stroke: #111;
      stroke-linecap: round;
      transition: stroke-dashoffset 900ms linear;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px;
    }

    .ring-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .ring-unit-label,
    .ring-note {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
    }

    .ring-note {
      margin-top: 12px;
      letter-spacing: normal;
      text-transform: none;
      text-align: left;
      font-size: 15px;
    }

    .device-box {
      font-size: 15px;
      color: var(--ink);
    }

    .full-link-row {
      margin-top: 2px;
    }

    .planet-link {
      display: block;
      width: 100%;
      padding: 26px 20px;
      border-radius: 20px;
      font-size: clamp(22px, 3vw, 28px);
      letter-spacing: -0.03em;
    }

    @media (max-width: 1040px) {
      .dashboard-grid,
      .work-field-row,
      .fields.two {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .shell {
        padding: 14px;
        border-radius: 24px;
      }

      .hero {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .hero-tools {
        justify-content: center;
      }

      .hero-copy p {
        margin-left: auto;
        margin-right: auto;
      }

      .auth-card,
      .panel {
        padding: 16px;
        border-radius: 24px;
      }

      .profile-hero {
        grid-template-columns: 72px 1fr;
      }

      .profile-avatar,
      .hero-logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
      }

      .profile-name {
        font-size: 24px;
      }

      .stage-head {
        flex-direction: column;
      }

      .hero-tools,
      .hero-actions,
      .editor-actions,
      .work-actions,
      .stage-toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .ring-wrap,
      .ring-svg {
        width: 88px;
        height: 88px;
      }

      .ring-value {
        font-size: 20px;
      }
    }

    @media (max-width: 480px) {
      .hero-tools,
      .hero-actions,
      .editor-actions,
      .work-actions,
      .stage-toolbar {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .small-button,
      .nav-button.light,
      .nav-button.dark {
        width: 100%;
        padding-left: 10px;
        padding-right: 10px;
      }

      .ring-cluster {
        gap: 8px;
      }

      .ring-wrap,
      .ring-svg {
        width: 76px;
        height: 76px;
      }

      .ring-center {
        padding: 10px;
      }

      .ring-value {
        font-size: 17px;
      }

      .ring-unit-label {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <img class="hero-logo" src="./logo.png" alt="CB Lock Logo">
      <div class="hero-copy">
        <h1 id="heroTitle">控制台</h1>
      </div>
      <div id="heroTools" class="hero-tools" hidden>
        <button id="toggleSettingsBtn" class="small-button" type="button">设置</button>
        <button id="logoutBtn" class="small-button" type="button">退出登录</button>
        <button id="deleteBtn" class="small-button danger" type="button">注销账户</button>
      </div>
    </section>

    <section id="authShell" class="auth-shell">
      <section class="auth-card">
        <div class="auth-head">
          <h2>账户入口</h2>
          <p>注册或登录后，页面会自动切换到当前用户面板。</p>
        </div>

        <div class="tabs">
          <button id="tabLogin" class="tab active" type="button">登录</button>
          <button id="tabRegister" class="tab" type="button">注册</button>
        </div>

        <section id="loginPanel" class="form-panel">
          <div class="fields">
            <label>账户
              <input id="loginAccount" type="text" autocomplete="username" placeholder="输入已注册账户">
            </label>
            <label>密码
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="输入密码">
            </label>
          </div>
          <button id="loginBtn" class="submit" type="button">登录</button>
        </section>

        <section id="registerPanel" class="form-panel" hidden>
          <div class="fields">
            <label>账户
              <input id="registerAccount" type="text" autocomplete="username" placeholder="例如 puppy001">
            </label>
            <label>密码
              <input id="registerPassword" type="password" autocomplete="new-password" placeholder="至少 6 位">
            </label>
          </div>
          <div class="fields two" style="margin-top:14px;">
            <label>DOM 字段
              <input id="registerDom" list="accountOptions" type="text" placeholder="可留空，或填写已存在账户">
            </label>
            <label>SUB 字段
              <input id="registerSub" list="accountOptions" type="text" placeholder="可留空，或填写已存在账户">
            </label>
          </div>
          <div class="fields" style="margin-top:14px;">
            <div class="hint">`dom` 和 `sub` 如果填写，必须指向数据库里已存在的账户。</div>
          </div>
          <button id="registerBtn" class="submit" type="button">注册并登录</button>
        </section>

        <div id="authStatus" class="status">未登录。</div>
      </section>
    </section>

    <section id="dashboard" class="dashboard" hidden>
      <div class="dashboard-grid">
        <section class="panel workbench">
          <div class="profile-hero" style="margin-bottom:14px;">
            <img id="profileAvatar" class="profile-avatar" src="./logo.png" alt="Current User Avatar">
            <div>
              <div id="profileHeroName" class="profile-name">当前用户</div>
              <p id="profileHeroSubtitle" class="profile-subtitle">登录后在这里管理账户关系与当前角色。</p>
            </div>
          </div>

          <div id="settingsEditor" class="editor" hidden>
            <h3>修改 DOM / SUB</h3>
            <p class="muted">这里填写的 `dom` 和 `sub` 必须是已存在账户。留空表示取消关系。</p>
            <div class="fields two">
              <label>DOM
                <input id="editDom" list="accountOptions" type="text" placeholder="输入已存在账户">
              </label>
              <label>SUB
                <input id="editSub" list="accountOptions" type="text" placeholder="输入已存在账户">
              </label>
            </div>
            <div class="editor-actions">
              <button id="saveProfileBtn" class="small-button" type="button">保存关系</button>
            </div>
          </div>

          <section id="domWorkbench" class="work-card" hidden>
            <div class="control-card">
                <div class="stage-toolbar">
                  <div id="domDeviceState" class="pill">锁状态：离线</div>
                </div>

                <div class="stage-card">
                  <div class="work-field-row">
                    <label for="domUnlockTime">
                      <span style="display:block;margin-bottom:6px;">自动开锁时间</span>
                      <span class="hint">按照这个时间下发策略，倒计时与硬件状态都以它为基准。</span>
                    </label>
                    <input id="domUnlockTime" class="work-input" type="datetime-local">
                  </div>

                  <div class="work-actions">
                    <button id="domApplyBtn" class="small-button" type="button">应用策略</button>
                    <button id="domUnlockNowBtn" class="small-button" type="button">立即开锁</button>
                  </div>

                  <div class="ring-card">
                    <div class="ring-cluster">
                      <div class="ring-unit">
                        <div class="ring-wrap">
                          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                            <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                            <circle class="ring-progress" id="domRingHoursProgress" cx="52" cy="52" r="40"></circle>
                          </svg>
                          <div class="ring-center"><div id="domRingHoursValue" class="ring-value">--</div></div>
                        </div>
                        <div class="ring-unit-label">Hours</div>
                      </div>
                      <div class="ring-unit">
                        <div class="ring-wrap">
                          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                            <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                            <circle class="ring-progress" id="domRingMinutesProgress" cx="52" cy="52" r="40"></circle>
                          </svg>
                          <div class="ring-center"><div id="domRingMinutesValue" class="ring-value">--</div></div>
                        </div>
                        <div class="ring-unit-label">Minutes</div>
                      </div>
                      <div class="ring-unit">
                        <div class="ring-wrap">
                          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                            <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                            <circle class="ring-progress" id="domRingSecondsProgress" cx="52" cy="52" r="40"></circle>
                          </svg>
                          <div class="ring-center"><div id="domRingSecondsValue" class="ring-value">--</div></div>
                        </div>
                        <div class="ring-unit-label">Seconds</div>
                      </div>
                    </div>
                    <div id="domRingNote" class="ring-note">等待设置自动开锁时间。</div>
                  </div>
                </div>
            </div>
          </section>

          <section id="subWorkbench" class="work-card" hidden>
            <div class="control-card">
                <div class="stage-toolbar">
                  <div id="subDeviceState" class="pill">锁状态：离线</div>
                  <div id="subLockState" class="pill">当前已上锁</div>
                  <button id="subScanBtBtn" class="small-button" type="button">搜索蓝牙</button>
                  <button id="subConnectBtBtn" class="small-button" type="button">连接蓝牙</button>
                </div>

                <div class="stage-card">
                  <div class="ring-card" style="margin:0;">
                    <div class="ring-cluster">
                      <div class="ring-unit">
                        <div class="ring-wrap">
                          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                            <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                            <circle class="ring-progress" id="subRingHoursProgress" cx="52" cy="52" r="40"></circle>
                          </svg>
                          <div class="ring-center"><div id="subRingHoursValue" class="ring-value">--</div></div>
                        </div>
                        <div class="ring-unit-label">Hours</div>
                      </div>
                      <div class="ring-unit">
                        <div class="ring-wrap">
                          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                            <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                            <circle class="ring-progress" id="subRingMinutesProgress" cx="52" cy="52" r="40"></circle>
                          </svg>
                          <div class="ring-center"><div id="subRingMinutesValue" class="ring-value">--</div></div>
                        </div>
                        <div class="ring-unit-label">Minutes</div>
                      </div>
                      <div class="ring-unit">
                        <div class="ring-wrap">
                          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                            <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                            <circle class="ring-progress" id="subRingSecondsProgress" cx="52" cy="52" r="40"></circle>
                          </svg>
                          <div class="ring-center"><div id="subRingSecondsValue" class="ring-value">--</div></div>
                        </div>
                        <div class="ring-unit-label">Seconds</div>
                      </div>
                    </div>
                    <div id="subRingNote" class="ring-note">等待 DOM 设置时间。</div>
                  </div>
                </div>

                <div id="subBtDeviceInfo" class="device-box">尚未选择蓝牙设备。</div>
            </div>
          </section>

          <div class="full-link-row">
            <a class="planet-link" href="./planet.html">小狗星球</a>
          </div>
        </section>
      </div>
    </section>

    <datalist id="accountOptions"></datalist>
  </main>

  <script>
    const SESSION_KEY = "cb-lock-session";
    const API_DEVICE_STATUS = "/api/device-status";
    const API_DOM_STATE = "/api/state?mode=dom_control";
    const API_SUB_STATE = "/api/state?mode=sub_view";
    const ringCircumference = 2 * Math.PI * 40;

    const authShell = document.getElementById("authShell");
    const dashboard = document.getElementById("dashboard");
    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginPanel = document.getElementById("loginPanel");
    const registerPanel = document.getElementById("registerPanel");
    const registerAccount = document.getElementById("registerAccount");
    const registerPassword = document.getElementById("registerPassword");
    const registerDom = document.getElementById("registerDom");
    const registerSub = document.getElementById("registerSub");
    const registerBtn = document.getElementById("registerBtn");
    const loginAccount = document.getElementById("loginAccount");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const heroTitle = document.getElementById("heroTitle");
    const heroTools = document.getElementById("heroTools");
    const logoutBtn = document.getElementById("logoutBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const toggleSettingsBtn = document.getElementById("toggleSettingsBtn");
    const settingsEditor = document.getElementById("settingsEditor");
    const editDom = document.getElementById("editDom");
    const editSub = document.getElementById("editSub");
    const authStatus = document.getElementById("authStatus");
    const profileAvatar = document.getElementById("profileAvatar");
    const profileHeroName = document.getElementById("profileHeroName");
    const profileHeroSubtitle = document.getElementById("profileHeroSubtitle");
    const accountOptions = document.getElementById("accountOptions");
    const domWorkbench = document.getElementById("domWorkbench");
    const subWorkbench = document.getElementById("subWorkbench");

    const domUnlockTime = document.getElementById("domUnlockTime");
    const domApplyBtn = document.getElementById("domApplyBtn");
    const domUnlockNowBtn = document.getElementById("domUnlockNowBtn");
    const domDeviceState = document.getElementById("domDeviceState");
    const domRingHoursProgress = document.getElementById("domRingHoursProgress");
    const domRingMinutesProgress = document.getElementById("domRingMinutesProgress");
    const domRingSecondsProgress = document.getElementById("domRingSecondsProgress");
    const domRingHoursValue = document.getElementById("domRingHoursValue");
    const domRingMinutesValue = document.getElementById("domRingMinutesValue");
    const domRingSecondsValue = document.getElementById("domRingSecondsValue");
    const domRingNote = document.getElementById("domRingNote");

    const subLockState = document.getElementById("subLockState");
    const subDeviceState = document.getElementById("subDeviceState");
    const subScanBtBtn = document.getElementById("subScanBtBtn");
    const subConnectBtBtn = document.getElementById("subConnectBtBtn");
    const subBtDeviceInfo = document.getElementById("subBtDeviceInfo");
    const subRingHoursProgress = document.getElementById("subRingHoursProgress");
    const subRingMinutesProgress = document.getElementById("subRingMinutesProgress");
    const subRingSecondsProgress = document.getElementById("subRingSecondsProgress");
    const subRingHoursValue = document.getElementById("subRingHoursValue");
    const subRingMinutesValue = document.getElementById("subRingMinutesValue");
    const subRingSecondsValue = document.getElementById("subRingSecondsValue");
    const subRingNote = document.getElementById("subRingNote");

    let currentUser = null;
    let currentUsers = [];
    let currentSubState = null;
    let subBtDevice = null;
    let subBtCharacteristic = null;
    let subBtTimer = null;

    const serviceUuid = "000000ff-0000-1000-8000-00805f9b34fb";
    const characteristicUuid = "0000ff01-0000-1000-8000-00805f9b34fb";

    function setSession(token) {
      sessionStorage.setItem(SESSION_KEY, token);
    }

    function getSession() {
      return sessionStorage.getItem(SESSION_KEY);
    }

    function clearSession() {
      sessionStorage.removeItem(SESSION_KEY);
    }

    function setTab(mode) {
      const loginActive = mode === "login";
      tabLogin.classList.toggle("active", loginActive);
      tabRegister.classList.toggle("active", !loginActive);
      loginPanel.hidden = !loginActive;
      registerPanel.hidden = loginActive;
    }

    function setLoggedInView(loggedIn) {
      authShell.hidden = loggedIn;
      dashboard.hidden = !loggedIn;
      heroTools.hidden = !loggedIn;
      if (!loggedIn) {
        heroTitle.textContent = "账户入口";
      }
    }

    async function request(path, options = {}) {
      const headers = new Headers(options.headers || {});
      headers.set("Accept", "application/json");
      const token = getSession();
      if (token) headers.set("Authorization", `Bearer ${token}`);
      const response = await fetch(path, { ...options, headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

    function getUserRole(user) {
      if (user.dom && user.sub) return "INVALID";
      if (user.sub) return "DOM";
      if (user.dom) return "SUB";
      return "UNBOUND";
    }

    function getRoleText(role) {
      if (role === "INVALID") return "关系错误";
      if (role === "UNBOUND") return "未绑定";
      return role;
    }

    function updateProfileAvatar(role) {
      if (role === "DOM") {
        profileAvatar.src = "./dom.jpg";
        profileAvatar.alt = "DOM Avatar";
      } else if (role === "SUB") {
        profileAvatar.src = "./sub.jpg";
        profileAvatar.alt = "SUB Avatar";
      } else {
        profileAvatar.src = "./logo.png";
        profileAvatar.alt = "Current User Avatar";
      }
    }

    function renderProfile(user) {
      const role = getUserRole(user);
      currentUser = user;
      updateProfileAvatar(role);
      profileHeroName.textContent = user.account;
      profileHeroSubtitle.textContent =
        role === "DOM" ? `当前角色：DOM，绑定 SUB：${user.sub || "未设置"}`
        : role === "SUB" ? `当前角色：SUB，绑定 DOM：${user.dom || "未设置"}`
        : role === "INVALID" ? "当前账户的 DOM / SUB 关系冲突，请先修正。"
        : "当前账户还没有绑定 DOM / SUB 关系。";

      editDom.value = user.dom || "";
      editSub.value = user.sub || "";

      if (role === "INVALID") {
        authStatus.textContent = "当前账户同时设置了 DOM 和 SUB，这是无效关系，请先修正。";
      }
    }

    function renderUsers(users) {
      currentUsers = users;
      accountOptions.innerHTML = users.map((user) => `<option value="${user.account}"></option>`).join("");
    }

    function parseRemainingTimeText(value) {
      const match = /^(\d{2,}):(\d{2}):(\d{2})$/.exec(value || "");
      if (!match) return null;
      const hours = Number(match[1]);
      const minutes = Number(match[2]);
      const seconds = Number(match[3]);
      if ([hours, minutes, seconds].some((part) => Number.isNaN(part))) return null;
      return { hours, minutes, seconds };
    }

    function setRingProgress(element, progress) {
      element.style.strokeDasharray = `${ringCircumference}`;
      element.style.strokeDashoffset = `${ringCircumference * (1 - progress)}`;
    }

    function syncRing(remainingText, totalMs, refs, idleText) {
      const parts = parseRemainingTimeText(remainingText);
      if (!parts || !totalMs || totalMs <= 0) {
        setRingProgress(refs.hoursProgress, 0);
        setRingProgress(refs.minutesProgress, 0);
        setRingProgress(refs.secondsProgress, 0);
        refs.hoursValue.textContent = remainingText === "00:00:00" && totalMs ? "00" : "--";
        refs.minutesValue.textContent = remainingText === "00:00:00" && totalMs ? "00" : "--";
        refs.secondsValue.textContent = remainingText === "00:00:00" && totalMs ? "00" : "--";
        refs.note.textContent = totalMs ? "开锁时间已到，倒计时完成。" : idleText;
        return;
      }

      const hoursProgressBase = Math.max(1, Math.ceil(totalMs / 3600000));
      setRingProgress(refs.hoursProgress, Math.max(0, Math.min(1, parts.hours / hoursProgressBase)));
      setRingProgress(refs.minutesProgress, Math.max(0, Math.min(1, parts.minutes / 59)));
      setRingProgress(refs.secondsProgress, Math.max(0, Math.min(1, parts.seconds / 59)));
      refs.hoursValue.textContent = String(Math.min(parts.hours, 99)).padStart(2, "0");
      refs.minutesValue.textContent = String(parts.minutes).padStart(2, "0");
      refs.secondsValue.textContent = String(parts.seconds).padStart(2, "0");
      refs.note.textContent = `距离自动开锁还有 ${remainingText}。`;
    }

    function getRingRefs(prefix) {
      return {
        hoursProgress: document.getElementById(`${prefix}RingHoursProgress`),
        minutesProgress: document.getElementById(`${prefix}RingMinutesProgress`),
        secondsProgress: document.getElementById(`${prefix}RingSecondsProgress`),
        hoursValue: document.getElementById(`${prefix}RingHoursValue`),
        minutesValue: document.getElementById(`${prefix}RingMinutesValue`),
        secondsValue: document.getElementById(`${prefix}RingSecondsValue`),
        note: document.getElementById(`${prefix}RingNote`)
      };
    }

    function setPillState(element, text, active) {
      element.textContent = text;
      element.classList.toggle("online", !!active);
      element.classList.toggle("unlocked", !!active);
    }

    function renderWorkbenches() {
      const role = currentUser ? getUserRole(currentUser) : "UNBOUND";
      domWorkbench.hidden = role !== "DOM";
      subWorkbench.hidden = role !== "SUB";
      heroTitle.textContent =
        role === "DOM" ? "DOM 控制台"
        : role === "SUB" ? "SUB 控制台"
        : role === "INVALID" ? "关系错误"
        : "控制台";
    }

    async function refreshDashboard() {
      const me = await request("/api/me");
      const list = await request("/api/users");
      renderProfile(me.user);
      renderUsers(list.users || []);
      renderWorkbenches();
      authStatus.textContent = `已登录账户：${me.user.account}`;
      setLoggedInView(true);
      await refreshWorkbenchStates();
    }

    async function refreshMe() {
      const token = getSession();
      if (!token) {
        setLoggedInView(false);
        authStatus.textContent = "未登录。";
        currentUser = null;
        currentUsers = [];
        settingsEditor.hidden = true;
        toggleSettingsBtn.textContent = "设置";
        return;
      }

      try {
        await refreshDashboard();
      } catch (error) {
        clearSession();
        setLoggedInView(false);
        authStatus.textContent = "登录已失效，请重新登录。";
      }
    }

    async function refreshWorkbenchStates() {
      if (!currentUser) return;
      const role = getUserRole(currentUser);

      if (role === "DOM") {
        const state = await request(API_DOM_STATE);
        const scheduledAt = state.scheduledAt ? new Date(state.scheduledAt) : null;
        const unlockAt = state.unlockTime ? new Date(state.unlockTime) : null;
        const totalMs = scheduledAt && unlockAt ? Math.max(unlockAt.getTime() - scheduledAt.getTime(), 0) : null;
        setPillState(domDeviceState, `锁状态：${state.deviceOnline ? "在线" : "离线"}`, state.deviceOnline);
        if (unlockAt && !Number.isNaN(unlockAt.getTime()) && document.activeElement !== domUnlockTime) {
          domUnlockTime.value = `${unlockAt.getFullYear()}-${String(unlockAt.getMonth() + 1).padStart(2, "0")}-${String(unlockAt.getDate()).padStart(2, "0")}T${String(unlockAt.getHours()).padStart(2, "0")}:${String(unlockAt.getMinutes()).padStart(2, "0")}`;
        }
        if (!state.unlockTime && document.activeElement !== domUnlockTime) {
          domUnlockTime.value = "";
        }
        syncRing(state.remainingTime || "--:--:--", totalMs, getRingRefs("dom"), "等待设置自动开锁时间。");
      }

      if (role === "SUB") {
        const state = await request(API_SUB_STATE);
        currentSubState = state;
        const scheduledAt = state.scheduledAt ? new Date(state.scheduledAt) : null;
        const unlockAt = state.unlockTime ? new Date(state.unlockTime) : null;
        const totalMs = scheduledAt && unlockAt ? Math.max(unlockAt.getTime() - scheduledAt.getTime(), 0) : null;
        setPillState(subLockState, state.locked ? "当前已上锁" : "当前已开锁", !state.locked);
        setPillState(subDeviceState, `锁状态：${state.deviceOnline ? "在线" : "离线"}`, state.deviceOnline);
        syncRing(state.remainingTime || "--:--:--", totalMs, getRingRefs("sub"), "等待 DOM 设置时间。");
      }
    }

    async function updateDeviceStatus(isOnline, keepalive = false) {
      const token = getSession();
      if (!token) return;
      await fetch(API_DEVICE_STATUS, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Accept: "application/json",
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ isOnline }),
        keepalive
      }).catch(() => {});
    }

    function getSubPayloadFromState(state) {
      return {
        account: state.user.account,
        dom: state.user.dom,
        sub: state.user.sub,
        locked: !!state.locked,
        unlockTime: state.unlockTime || null,
        remainingTime: state.remainingTime || "--:--:--",
        source: "sub",
        sentAt: new Date().toISOString()
      };
    }

    async function scanBluetoothDevice() {
      if (!navigator.bluetooth) {
        throw new Error("当前浏览器不支持 Web Bluetooth，请使用最新版 Chrome 或 Edge。");
      }
      subBtDevice = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [serviceUuid]
      });
      subBtDeviceInfo.textContent = `已选择设备：${subBtDevice.name || "Unknown Device"}`;
      subBtDevice.addEventListener("gattserverdisconnected", () => {
        subBtCharacteristic = null;
        if (subBtTimer) {
          clearInterval(subBtTimer);
          subBtTimer = null;
        }
        void updateDeviceStatus(false);
        setPillState(subDeviceState, "锁状态：离线", false);
        subBtDeviceInfo.textContent = `设备已断开：${subBtDevice ? subBtDevice.name || "Unknown Device" : "Unknown Device"}`;
      });
    }

    async function connectBluetooth() {
      if (!navigator.bluetooth) {
        throw new Error("当前浏览器不支持 Web Bluetooth，请使用最新版 Chrome 或 Edge。");
      }
      if (!subBtDevice) {
        throw new Error("请先搜索并选择蓝牙设备。");
      }
      const server = await subBtDevice.gatt.connect();
      const service = await server.getPrimaryService(serviceUuid);
      subBtCharacteristic = await service.getCharacteristic(characteristicUuid);
      await updateDeviceStatus(true);
      setPillState(subDeviceState, "锁状态：在线", true);
      subBtDeviceInfo.textContent = `已连接设备：${subBtDevice.name || "Unknown Device"}`;
      if (subBtTimer) clearInterval(subBtTimer);
      subBtTimer = setInterval(() => void safeBluetoothSend(), 1000);
      await safeBluetoothSend();
    }

    async function sendBluetoothState() {
      if (!subBtCharacteristic || !currentSubState) return;
      const encoded = new TextEncoder().encode(JSON.stringify(getSubPayloadFromState(currentSubState)));
      if (typeof subBtCharacteristic.writeValueWithoutResponse === "function") {
        await subBtCharacteristic.writeValueWithoutResponse(encoded);
      } else {
        await subBtCharacteristic.writeValue(encoded);
      }
    }

    async function safeBluetoothSend() {
      try {
        await sendBluetoothState();
      } catch (error) {
        subBtDeviceInfo.textContent = `发送失败：${error.message}`;
      }
    }

    tabLogin.addEventListener("click", () => setTab("login"));
    tabRegister.addEventListener("click", () => setTab("register"));

    registerBtn.addEventListener("click", async () => {
      try {
        const payload = await request("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            account: registerAccount.value,
            password: registerPassword.value,
            dom: registerDom.value,
            sub: registerSub.value
          })
        });
        setSession(payload.token);
        await refreshDashboard();
      } catch (error) {
        authStatus.textContent = `注册失败：${error.message}`;
      }
    });

    loginBtn.addEventListener("click", async () => {
      try {
        const payload = await request("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            account: loginAccount.value,
            password: loginPassword.value
          })
        });
        setSession(payload.token);
        await refreshDashboard();
      } catch (error) {
        authStatus.textContent = `登录失败：${error.message}`;
      }
    });

    saveProfileBtn.addEventListener("click", async () => {
      try {
        await request("/api/account/profile", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            dom: editDom.value,
            sub: editSub.value
          })
        });
        await refreshDashboard();
      } catch (error) {
        authStatus.textContent = `保存关系失败：${error.message}`;
      }
    });

    toggleSettingsBtn.addEventListener("click", () => {
      settingsEditor.hidden = !settingsEditor.hidden;
      toggleSettingsBtn.textContent = settingsEditor.hidden ? "设置" : "收起设置";
    });

    domApplyBtn.addEventListener("click", async () => {
      try {
        let unlockTimeValue = null;
        if (domUnlockTime.value) {
          const unlockDate = new Date(domUnlockTime.value);
          if (Number.isNaN(unlockDate.getTime()) || unlockDate.getTime() <= Date.now()) {
            authStatus.textContent = "开锁时间无效或早于当前时间。";
            return;
          }
          unlockTimeValue = unlockDate.toISOString();
        }

        await request(API_DOM_STATE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            locked: true,
            unlockTime: unlockTimeValue,
            source: "dom"
          })
        });
        await refreshWorkbenchStates();
      } catch (error) {
        authStatus.textContent = `保存失败：${error.message}`;
      }
    });

    domUnlockNowBtn.addEventListener("click", async () => {
      try {
        await request(API_DOM_STATE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            locked: false,
            unlockTime: null,
            source: "dom"
          })
        });
        await refreshWorkbenchStates();
      } catch (error) {
        authStatus.textContent = `立即开锁失败：${error.message}`;
      }
    });

    subScanBtBtn.addEventListener("click", async () => {
      try {
        await scanBluetoothDevice();
      } catch (error) {
        subBtDeviceInfo.textContent = `搜索失败：${error.message}`;
      }
    });

    subConnectBtBtn.addEventListener("click", async () => {
      try {
        await connectBluetooth();
      } catch (error) {
        subBtDeviceInfo.textContent = `连接失败：${error.message}`;
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await request("/api/logout", { method: "POST" });
      } catch {
      }
      clearSession();
      await refreshMe();
    });

    deleteBtn.addEventListener("click", async () => {
      if (!confirm("删除当前账户后，关联的锁状态和会话都会一起删除。是否继续？")) {
        return;
      }
      try {
        await request("/api/account", { method: "DELETE" });
        clearSession();
        await refreshMe();
      } catch (error) {
        authStatus.textContent = `注销失败：${error.message}`;
      }
    });

    window.addEventListener("beforeunload", () => {
      void updateDeviceStatus(false, true);
    });

    setTab("login");
    refreshMe();
    setInterval(() => {
      if (getSession() && !dashboard.hidden) {
        void refreshWorkbenchStates().catch(() => {});
      }
    }, 1000);
  </script>
</body>
</html>
