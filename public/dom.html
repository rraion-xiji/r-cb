<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Control</title>
  <style>
    :root {
      --bg: #080808;
      --shell: #121212;
      --panel: #f3efe7;
      --panel-edge: rgba(91, 73, 49, 0.14);
      --ink: #14110f;
      --muted: #76695a;
      --line: rgba(91, 73, 49, 0.16);
      --dark-button: #4a3418;
      --dark-button-hover: #5c4120;
      --safe: #1d8b57;
      --safe-bg: rgba(29, 139, 87, 0.14);
      --safe-line: rgba(29, 139, 87, 0.3);
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 255, 255, 0.06), transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(120, 95, 58, 0.14), transparent 24%),
        linear-gradient(180deg, #060606 0%, #0e0e0e 100%);
      padding: 18px;
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
      border-radius: 30px;
      background: linear-gradient(180deg, #151515, #101010);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .hero-logo {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      object-fit: cover;
      background: #000;
      border: 2px solid rgba(255, 255, 255, 0.14);
      image-rendering: pixelated;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .hero-copy p {
      margin: 10px 0 0;
      color: rgba(255, 244, 234, 0.78);
      font-size: 16px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-button,
    .action-button {
      border-radius: 16px;
      border: 1px solid var(--panel-edge);
      background: #f5ebd8;
      color: var(--ink);
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .stage {
      border-radius: 28px;
      background: #efefef;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stage-inner {
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid rgba(91, 73, 49, 0.12);
      padding: 18px;
      color: var(--ink);
    }

    .stage-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .stage-title {
      font-size: clamp(30px, 4vw, 46px);
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .stage-role {
      margin-top: 8px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    .status-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.6);
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.active {
      color: var(--safe);
      background: var(--safe-bg);
      border-color: var(--safe-line);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .portrait-card,
    .control-card,
    .ring-card {
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
    }

    .portrait-card {
      display: grid;
      place-items: center;
      padding: 16px;
      min-height: 270px;
    }

    .portrait-card img {
      width: min(100%, 260px);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      image-rendering: pixelated;
      border-radius: 18px;
      background: #fff;
    }

    .control-card {
      padding: 18px;
    }

    .control-head {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .control-head strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .control-head .hint {
      color: var(--muted);
      line-height: 1.6;
      max-width: 480px;
    }

    .control-head input[type="datetime-local"] {
      width: min(100%, 320px);
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(91, 73, 49, 0.18);
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      font-size: 15px;
    }

    .control-actions {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .message-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .message-box {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
    }

    .message-box strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .message-box textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid rgba(91, 73, 49, 0.24);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fffdfa;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    .message-box textarea:focus {
      border-color: rgba(20, 17, 15, 0.6);
      box-shadow: 0 0 0 3px rgba(20, 17, 15, 0.08);
    }

    .message-box textarea[readonly] {
      background: rgba(255, 255, 255, 0.88);
    }

    .message-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .action-button.primary {
      background: #f6ecda;
    }

    .action-button.secondary {
      background: transparent;
      color: var(--ink);
    }

    .ring-card {
      padding: 18px 14px 14px;
    }

    .ring-cluster {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .ring-unit {
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .ring-wrap {
      position: relative;
      width: 132px;
      height: 132px;
    }

    .ring-svg {
      width: 132px;
      height: 132px;
      transform: rotate(-90deg);
    }

    .ring-track,
    .ring-progress {
      fill: none;
      stroke-width: 8;
    }

    .ring-track { stroke: rgba(20, 17, 15, 0.12); }
    .ring-progress { stroke: #111; stroke-linecap: round; transition: stroke-dashoffset 900ms linear; }

    .ring-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
    }

    .ring-value {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    .ring-unit-label {
      color: #6a5139;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ring-note {
      margin-top: 14px;
      color: #6a5139;
      font-size: 14px;
      text-align: left;
    }

    .planet-bar {
      margin-top: 18px;
    }

    .planet-link {
      display: block;
      width: 100%;
      padding: 18px 22px;
      border-radius: 18px;
      background: #4a3418;
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .planet-link:hover {
      background: var(--dark-button-hover);
    }

    @media (max-width: 980px) {
      .hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .hero-actions,
      .status-row {
        justify-content: flex-start;
      }
    }

    @media (max-width: 680px) {
      body {
        padding: 10px;
      }

      .shell,
      .stage,
      .stage-inner {
        border-radius: 22px;
      }

      .shell {
        padding: 12px;
      }

      .stage,
      .stage-inner {
        padding: 12px;
      }

      .hero {
        gap: 14px;
      }

      .hero-logo {
        width: 82px;
        height: 82px;
        border-radius: 22px;
      }

      .stage-top,
      .control-head,
      .control-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .message-grid {
        grid-template-columns: 1fr;
      }

      .control-head input[type="datetime-local"],
      .nav-button,
      .action-button {
        width: 100%;
      }

      .ring-cluster {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .ring-wrap,
      .ring-svg {
        width: 86px;
        height: 86px;
      }

      .ring-center {
        padding: 10px;
      }

      .ring-value {
        font-size: 20px;
      }

      .ring-unit-label {
        font-size: 12px;
      }

      .planet-link {
        font-size: 22px;
        padding: 16px 18px;
      }
    }

    @media (max-width: 420px) {
      .ring-wrap,
      .ring-svg {
        width: 74px;
        height: 74px;
      }

      .ring-value {
        font-size: 18px;
      }

      .pill {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <img class="hero-logo" src="./dom.jpg" alt="DOM Logo">
      <div class="hero-copy">
        <h1 id="heroName">DOM</h1>
        <p id="heroSubtitle">正在读取目标关系...</p>
      </div>
      <div class="hero-actions">
        <a class="nav-button" href="./index.html">返回入口</a>
        <a class="nav-button" href="./planet.html">小狗星球</a>
      </div>
    </section>

    <section class="stage">
      <div class="stage-inner">
        <div class="stage-top">
          <div>
            <div class="stage-title" id="targetTitle">SUB : --</div>
            <div class="stage-role">DOM 控制面板</div>
          </div>
          <div class="status-row">
            <div id="deviceState" class="pill">锁状态：离线</div>
            <div id="lockState" class="pill">当前已上锁</div>
          </div>
        </div>

        <div class="content-grid">
          <section class="portrait-card">
            <img src="./dom.jpg" alt="DOM Portrait">
          </section>

          <section class="control-card">
            <div class="control-head">
              <div>
                <strong>自动开锁时间</strong>
                <div class="hint">到点后服务器会把目标 SUB 账户的状态自动切为已开锁。</div>
              </div>
              <input id="unlockTime" type="datetime-local">
            </div>

            <div class="control-actions">
              <button id="applyBtn" class="action-button primary" type="button">应用策略</button>
              <button id="unlockNowBtn" class="action-button secondary" type="button">立即开锁</button>
            </div>

            <div class="message-grid">
              <div class="message-box">
                <strong>给 SUB 的留言</strong>
                <textarea id="messageInput" placeholder="输入要一起发给 SUB 的留言"></textarea>
                <div class="message-actions">
                  <button id="saveMessageBtn" class="action-button secondary" type="button">保存留言</button>
                </div>
              </div>
              <div class="message-box">
                <strong>SUB 给你的留言</strong>
                <textarea id="receivedMessage" readonly placeholder="SUB 的留言会显示在这里"></textarea>
              </div>
            </div>

            <div class="ring-card">
              <div class="ring-cluster">
                <div class="ring-unit">
                  <div class="ring-wrap">
                    <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                      <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                      <circle class="ring-progress" id="ringHoursProgress" cx="52" cy="52" r="40"></circle>
                    </svg>
                    <div class="ring-center"><div id="ringHoursValue" class="ring-value">--</div></div>
                  </div>
                  <div class="ring-unit-label">Hours</div>
                </div>
                <div class="ring-unit">
                  <div class="ring-wrap">
                    <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                      <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                      <circle class="ring-progress" id="ringMinutesProgress" cx="52" cy="52" r="40"></circle>
                    </svg>
                    <div class="ring-center"><div id="ringMinutesValue" class="ring-value">--</div></div>
                  </div>
                  <div class="ring-unit-label">Minutes</div>
                </div>
                <div class="ring-unit">
                  <div class="ring-wrap">
                    <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true">
                      <circle class="ring-track" cx="52" cy="52" r="40"></circle>
                      <circle class="ring-progress" id="ringSecondsProgress" cx="52" cy="52" r="40"></circle>
                    </svg>
                    <div class="ring-center"><div id="ringSecondsValue" class="ring-value">--</div></div>
                  </div>
                  <div class="ring-unit-label">Seconds</div>
                </div>
              </div>
              <div id="ringNote" class="ring-note">等待设置自动开锁时间。</div>
            </div>
          </section>
        </div>

        <div class="planet-bar">
          <a class="planet-link" href="./planet.html">小狗星球</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SESSION_KEY = "cb-lock-session";
    const API_URL = "/api/state?mode=dom_control";
    const ringCircumference = 2 * Math.PI * 40;

    const heroName = document.getElementById("heroName");
    const heroSubtitle = document.getElementById("heroSubtitle");
    const targetTitle = document.getElementById("targetTitle");
    const deviceState = document.getElementById("deviceState");
    const lockState = document.getElementById("lockState");
    const unlockTime = document.getElementById("unlockTime");
    const applyBtn = document.getElementById("applyBtn");
    const unlockNowBtn = document.getElementById("unlockNowBtn");
    const messageInput = document.getElementById("messageInput");
    const saveMessageBtn = document.getElementById("saveMessageBtn");
    const receivedMessage = document.getElementById("receivedMessage");
    const ringHoursProgress = document.getElementById("ringHoursProgress");
    const ringMinutesProgress = document.getElementById("ringMinutesProgress");
    const ringSecondsProgress = document.getElementById("ringSecondsProgress");
    const ringHoursValue = document.getElementById("ringHoursValue");
    const ringMinutesValue = document.getElementById("ringMinutesValue");
    const ringSecondsValue = document.getElementById("ringSecondsValue");
    const ringNote = document.getElementById("ringNote");
    let currentState = null;

    function getSession() {
      return sessionStorage.getItem(SESSION_KEY);
    }

    function clearSession() {
      sessionStorage.removeItem(SESSION_KEY);
    }

    function redirectToPortal(message) {
      clearSession();
      window.location.href = `./index.html${message ? `#${encodeURIComponent(message)}` : ""}`;
    }

    async function request(path, options = {}) {
      const token = getSession();
      if (!token) {
        redirectToPortal("请先登录");
        throw new Error("未登录");
      }

      const headers = new Headers(options.headers || {});
      headers.set("Accept", "application/json");
      headers.set("Authorization", `Bearer ${token}`);
      const response = await fetch(path, { ...options, headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 401) {
          redirectToPortal(payload.error || "登录已失效");
        }
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatDate(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function setRingProgress(element, progress) {
      element.style.strokeDasharray = `${ringCircumference}`;
      element.style.strokeDashoffset = `${ringCircumference * (1 - progress)}`;
    }

    function parseRemainingTimeText(value) {
      const match = /^(\d{2,}):(\d{2}):(\d{2})$/.exec(value || "");
      if (!match) return null;
      const hours = Number(match[1]);
      const minutes = Number(match[2]);
      const seconds = Number(match[3]);
      if ([hours, minutes, seconds].some((part) => Number.isNaN(part))) return null;
      return { hours, minutes, seconds };
    }

    function syncRing(remainingTimeText, totalMs) {
      const parts = parseRemainingTimeText(remainingTimeText);
      if (!parts || !totalMs || totalMs <= 0) {
        setRingProgress(ringHoursProgress, 0);
        setRingProgress(ringMinutesProgress, 0);
        setRingProgress(ringSecondsProgress, 0);
        ringHoursValue.textContent = remainingTimeText === "00:00:00" && totalMs ? "00" : "--";
        ringMinutesValue.textContent = remainingTimeText === "00:00:00" && totalMs ? "00" : "--";
        ringSecondsValue.textContent = remainingTimeText === "00:00:00" && totalMs ? "00" : "--";
        ringNote.textContent = totalMs ? "开锁时间已到，倒计时完成。" : "等待设置自动开锁时间。";
        return;
      }

      const hoursProgressBase = Math.max(1, Math.ceil(totalMs / 3600000));
      setRingProgress(ringHoursProgress, Math.max(0, Math.min(1, parts.hours / hoursProgressBase)));
      setRingProgress(ringMinutesProgress, Math.max(0, Math.min(1, parts.minutes / 59)));
      setRingProgress(ringSecondsProgress, Math.max(0, Math.min(1, parts.seconds / 59)));
      ringHoursValue.textContent = pad(Math.min(parts.hours, 99));
      ringMinutesValue.textContent = pad(parts.minutes);
      ringSecondsValue.textContent = pad(parts.seconds);
      ringNote.textContent = `距离自动开锁还有 ${remainingTimeText || "--:--:--"}。`;
    }

    function setPillState(element, text, active) {
      element.textContent = text;
      element.classList.toggle("active", !!active);
    }

    function renderState(state) {
      currentState = state;
      if (!state.actor?.sub) {
        redirectToPortal("当前账户不能打开 DOM 控制页");
        return;
      }

      heroName.textContent = state.actor.account;
      heroSubtitle.textContent = `绑定 SUB：${state.user.account}`;
      targetTitle.textContent = `SUB : ${state.user.account}`;
      if (document.activeElement !== messageInput) {
        messageInput.value = state.domMessage || "";
      }
      receivedMessage.value = state.subMessage || "";
      setPillState(deviceState, `锁状态：${state.deviceOnline ? "在线" : "离线"}`, state.deviceOnline);
      setPillState(lockState, state.locked ? "当前已上锁" : "当前已开锁", !state.locked);

      if (!state.unlockTime) {
        if (document.activeElement !== unlockTime) {
          unlockTime.value = "";
        }
        syncRing(null, null);
        return;
      }

      const autoUnlockAt = new Date(state.unlockTime);
      const scheduledAt = state.scheduledAt ? new Date(state.scheduledAt) : null;
      if (document.activeElement !== unlockTime && !Number.isNaN(autoUnlockAt.getTime())) {
        unlockTime.value = `${autoUnlockAt.getFullYear()}-${pad(autoUnlockAt.getMonth() + 1)}-${pad(autoUnlockAt.getDate())}T${pad(autoUnlockAt.getHours())}:${pad(autoUnlockAt.getMinutes())}`;
      }
      const totalMs = scheduledAt && !Number.isNaN(scheduledAt.getTime())
        ? Math.max(autoUnlockAt.getTime() - scheduledAt.getTime(), 0)
        : null;
      syncRing(state.remainingTime || "--:--:--", totalMs);
    }

    async function refreshState() {
      try {
        const state = await request(API_URL);
        renderState(state);
      } catch (error) {
        ringNote.textContent = `同步失败: ${error.message}`;
      }
    }

    applyBtn.addEventListener("click", async () => {
      try {
        let unlockTimeValue = null;
        if (unlockTime.value) {
          const unlockDate = new Date(unlockTime.value);
          if (Number.isNaN(unlockDate.getTime()) || unlockDate.getTime() <= Date.now()) {
            ringNote.textContent = "开锁时间无效或早于当前时间。";
            return;
          }
          unlockTimeValue = unlockDate.toISOString();
        }

        const state = await request(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            locked: true,
            unlockTime: unlockTimeValue,
            source: "dom"
          })
        });
        ringNote.textContent = unlockTimeValue
          ? `已更新 ${state.user.account} 的开锁时间为 ${formatDate(new Date(unlockTimeValue))}。`
          : `已更新 ${state.user.account} 的状态，未设置自动开锁。`;
        renderState(state);
      } catch (error) {
        ringNote.textContent = `保存失败: ${error.message}`;
      }
    });

    unlockNowBtn.addEventListener("click", async () => {
      try {
        const state = await request(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            locked: false,
            unlockTime: null,
            source: "dom"
          })
        });
        ringNote.textContent = `已立即开锁 ${state.user.account}。`;
        renderState(state);
      } catch (error) {
        ringNote.textContent = `立即开锁失败: ${error.message}`;
      }
    });

    saveMessageBtn.addEventListener("click", async () => {
      try {
        const state = await request(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            locked: currentState ? !!currentState.locked : true,
            unlockTime: currentState ? currentState.unlockTime : null,
            domMessage: messageInput.value,
            source: "dom"
          })
        });
        ringNote.textContent = "留言已同步给 SUB。";
        renderState(state);
      } catch (error) {
        ringNote.textContent = `留言保存失败: ${error.message}`;
      }
    });

    refreshState();
    setInterval(refreshState, 1000);
  </script>
</body>
</html>
